<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Video Call - AI Smart Gestures</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm/vision_bundle.js" crossorigin="anonymous"></script>
</head>
<body class="bg-neutral-950 text-neutral-100 font-sans antialiased flex flex-col justify-between min-h-screen p-4">

    <header class="text-center py-4">
        <h1 class="text-xl font-bold tracking-tight text-white">AI Gesture Call</h1>
        <p class="text-xs text-neutral-400 mt-0.5">Video call dengan deteksi efek gestur tangan otomatis</p>
    </header>

    <main class="flex-1 flex flex-col gap-4 justify-center items-center w-full max-w-md mx-auto">
        <div class="relative w-full aspect-video bg-neutral-900 rounded-2xl overflow-hidden border border-neutral-800 shadow-lg">
            
            <video id="remoteVideo" autoplay playsinline class="w-full h-full object-cover transition-all duration-300"></video>
            <div class="absolute bottom-3 left-3 bg-neutral-950/70 px-2.5 py-1 rounded-lg text-xs font-medium backdrop-blur-md text-neutral-300 z-30">
                Teman Anda
            </div>

            <div class="absolute top-3 right-3 w-1/3 aspect-[3/4] bg-neutral-800 rounded-xl overflow-hidden border border-neutral-700 shadow-md z-10">
                <video id="localVideo" autoplay playsinline muted class="w-full h-full object-cover transition-all duration-500"></video>
            </div>

            <canvas id="fxCanvas" class="absolute inset-0 w-full h-full pointer-events-none z-20"></canvas>
        </div>

        <div class="w-full text-center bg-neutral-900/40 py-2 rounded-xl border border-neutral-800/50">
            <span class="text-xs text-neutral-400">Gestur Terdeteksi: </span>
            <span id="detectedGesture" class="text-xs font-bold text-amber-400">Mencari tangan...</span>
        </div>

        <div class="w-full bg-neutral-900 border border-neutral-800 p-5 rounded-2xl flex flex-col gap-4 shadow-sm">
            <div class="flex flex-col gap-1.5">
                <label class="text-xs font-semibold text-neutral-400 uppercase tracking-wider">ID Anda</label>
                <div class="flex gap-2">
                    <input type="text" id="myIdInput" readonly class="flex-1 bg-neutral-950 border border-neutral-800 rounded-xl px-3 py-2.5 text-sm text-amber-400 font-mono focus:outline-none" value="Menghubungkan...">
                    <button onclick="copyMyId()" class="bg-neutral-800 hover:bg-neutral-700 px-4 rounded-xl text-xs font-medium transition-colors">Salin</button>
                </div>
            </div>

            <div class="flex flex-col gap-1.5">
                <div class="flex gap-2">
                    <input type="text" id="peerIdInput" placeholder="Masukkan ID teman" class="flex-1 bg-neutral-950 border border-neutral-800 rounded-xl px-3 py-2.5 text-sm text-white placeholder-neutral-600 focus:outline-none font-mono">
                    <button onclick="startCall()" class="bg-white hover:bg-neutral-200 text-neutral-950 px-5 rounded-xl text-sm font-semibold transition-colors">Panggil</button>
                </div>
            </div>
            <p id="statusText" class="text-xs text-center text-neutral-500 font-medium">Inisialisasi sistem kamera & AI...</p>
        </div>
    </main>

    <script type="module">
        // Mengimpor library MediaPipe untuk pengenalan gestur dari CDN resmi
        import { GestureRecognizer, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm/vision_bundle.js";

        let localStream = null;
        let peer = null;
        let dataConnection = null;
        let gestureRecognizer;
        let lastVideoTime = -1;

        const localVideo = document.getElementById('localVideo');
        const remoteVideo = document.getElementById('remoteVideo');
        const statusText = document.getElementById('statusText');
        const fxCanvas = document.getElementById('fxCanvas');
        const ctx = fxCanvas.getContext('2d');
        const gestureIndicator = document.getElementById('detectedGesture');

        // Menyesuaikan ukuran canvas efek agar pas dengan wadah video
        function resizeCanvas() {
            fxCanvas.width = fxCanvas.clientWidth;
            fxCanvas.height = fxCanvas.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Array untuk menampung data animasi aktif yang sedang digambar di canvas
        let activeAnimations = [];

        // 1. Memuat Model AI Pengenal Gestur dari Google
        async function loadAndroidIosAI() {
            statusText.innerText = "Mengunduh modul kecerdasan buatan (AI)...";
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.8/wasm"
            );
            gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numHands: 2
            });
            statusText.innerText = "AI Siap. Mengaktifkan kamera...";
            startCamera();
        }

        // 2. Mengaktifkan Kamera HP
        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: true, audio: true })
                .then(stream => {
                    localStream = stream;
                    localVideo.srcObject = stream;
                    localVideo.addEventListener('loadeddata', predictLoop);
                    initPeer();
                })
                .catch(err => {
                    statusText.innerText = "❌ Gagal akses kamera. Izinkan izin di browser.";
                });
        }

        // 3. Loop Deteksi Gestur Berkelanjutan (Real-time Frame by Frame)
        async function predictLoop() {
            if (localVideo.currentTime !== lastVideoTime) {
                lastVideoTime = localVideo.currentTime;
                
                if (gestureRecognizer) {
                    const results = gestureRecognizer.recognizeForVideo(localVideo, performance.now());
                    
                    // Bersihkan atau reset status filter jika tidak ada tangan terdeteksi
                    if (results.gestures.length === 0) {
                        gestureIndicator.innerText = "Mencari tangan...";
                        localVideo.style.filter = "none"; // Hapus efek blur jika tangan turun
                    } else {
                        // Proses setiap gestur tangan yang terbaca
                        for (const gesture of results.gestures) {
                            const gestureName = gesture[0].categoryName;
                            processGestureEffect(gestureName);
                        }
                    }
                }
            }
            
            // Gambar frame animasi kustom di canvas
            drawFX();
            requestAnimationFrame(predictLoop);
        }

        // 4. Logika Pemrosesan Efek Sesuai Permintaan Kamu
        function processGestureEffect(name) {
            // Contoh pemetaan kategori gestur default MediaPipe:
            // "ILoveYou" atau kombinasi custom dapat dipetakan ke Love. 
            // "Victory" = 2 jari. "RockOn" = Metal.
            
            if (name === "ILoveYou" || name === "Heart") { 
                gestureIndicator.innerText = "❤️ LOVE GESTURE";
                // Tambahkan objek animasi triple love yang membesar dari tengah layar
                if (activeAnimations.filter(a => a.type === 'love').length < 3) {
                    activeAnimations.push({
                        type: 'love',
                        x: fxCanvas.width / 2,
                        y: fxCanvas.height / 2,
                        size: 5,
                        maxSize: 120,
                        opacity: 1
                    });
                    // Kirim sinyal efek ke HP teman via WebRTC
                    sendReactionToPeer('love');
                }
            } 
            else if (name === "Victory") { 
                gestureIndicator.innerText = "✌️ 2 JARI (BLUR SYSTEM)";
                // Mengaburkan seluruh tampilan kamera lokal kita secara total
                localVideo.style.filter = "blur(15px)";
                sendReactionToPeer('blur_on');
            } 
            else if (name === "Thumb_Up" || name === "RockOn") { 
                gestureIndicator.innerText = "🤘 METAL (BALON & EMOJI FEST)";
                // Tambahkan partikel festival kegembiraan
                if (activeAnimations.length < 20) {
                    const emojis = ['🎈', '🥳', '🎉', '✨', '🤩'];
                    activeAnimations.push({
                        type: 'festival',
                        x: Math.random() * fxCanvas.width,
                        y: fxCanvas.height,
                        text: emojis[Math.floor(Math.random() * emojis.length)],
                        speed: 2 + Math.random() * 4,
                        size: 20 + Math.random() * 20
                    });
                    sendReactionToPeer('festival');
                }
            }
        }

        // 5. Fungsi Menggambar Canvas Animasi (Rendering Engine)
        function drawFX() {
            ctx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);

            for (let i = activeAnimations.length - 1; i >= 0; i--) {
                let anim = activeAnimations[i];

                if (anim.type === 'love') {
                    anim.size += 4; // Mengembang dari kecil ke besar
                    anim.opacity -= 0.01; // Perlahan memudar sembari membesar

                    if (anim.opacity <= 0 || anim.size >= anim.maxSize) {
                        activeAnimations.splice(i, 1);
                        continue;
                    }

                    // Menggambar TRIPLE LOVE (Efek Berlapis / Bayangan Kedalaman)
                    ctx.save();
                    ctx.globalAlpha = anim.opacity;
                    ctx.font = `${anim.size}px serif`;
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    
                    // Layer 3 (Paling Belakang / Bayangan Terbesar)
                    ctx.fillText("❤️", anim.x + 8, anim.y + 8);
                    // Layer 2 (Tengah)
                    ctx.fillText("❤️", anim.x + 4, anim.y + 4);
                    // Layer 1 (Utama di Depan)
                    ctx.fillText("❤️", anim.x, anim.y);
                    
                    ctx.restore();
                } 
                else if (anim.type === 'festival') {
                    anim.y -= anim.speed; // Meluncur ke atas dari lubang/bawah layar

                    if (anim.y < -50) {
                        activeAnimations.splice(i, 1);
                        continue;
                    }

                    ctx.save();
                    ctx.font = `${anim.size}px serif`;
                    ctx.fillText(anim.text, anim.x, anim.y);
                    ctx.restore();
                }
            }
        }

        // --- SISTEM JARINGAN WEBRTC & SINKRONISASI EFEK KE HP LAWAN ---
        function initPeer() {
            peer = new Peer();
            peer.on('open', (id) => {
                document.getElementById('myIdInput').value = id;
                statusText.innerText = "Tersambung ke server global. Siap panggil!";
            });
            peer.on('call', (call) => {
                call.answer(localStream);
                call.on('stream', (remoteStream) => { remoteVideo.srcObject = remoteStream; });
            });
            peer.on('connection', (conn) => {
                dataConnection = conn;
                setupDataListener();
            });
        }

        window.startCall = function() {
            const peerId = document.getElementById('peerIdInput').value.trim();
            if (!peerId) return;
            const call = peer.call(peerId, localStream);
            call.on('stream', (remoteStream) => { remoteVideo.srcObject = remoteStream; });
            dataConnection = peer.connect(peerId);
            setupDataListener();
        };

        function setupDataListener() {
            dataConnection.on('data', (data) => {
                // Menerima perintah efek dari HP pengirim lintas negara/jaringan
                if (data.type === 'fx') {
                    if (data.effect === 'love') {
                        activeAnimations.push({ type: 'love', x: fxCanvas.width/2, y: fxCanvas.height/2, size: 5, maxSize: 120, opacity: 1 });
                    } else if (data.effect === 'blur_on') {
                        remoteVideo.style.filter = "blur(15px)";
                    } else if (data.effect === 'festival') {
                        const emojis = ['🎈', '🥳', '🎉'];
                        activeAnimations.push({ type: 'festival', x: Math.random()*fxCanvas.width, y: fxCanvas.height, text: emojis[0], speed: 3, size: 30 });
                    }
                }
            });
        }

        function sendReactionToPeer(effectName) {
            if (dataConnection && dataConnection.open) {
                dataConnection.send({ type: 'fx', effect: effectName });
            }
        }

        window.copyMyId = function() {
            const myIdInput = document.getElementById('myIdInput');
            myIdInput.select();
            navigator.clipboard.writeText(myIdInput.value);
            alert("ID disalin! Kirimkan ke teman.");
        };

        // Jalankan inisialisasi AI saat halaman dimuat
        loadAndroidIosAI();
    </script>
</body>
</html>
